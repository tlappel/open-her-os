version: '3.8'

services:
  Lila-brain:
    build: .
    container_name: Lila-brain
    stdin_open: true
    tty: true
    depends_on:
      - Lila-voice
      - Lila-memory
    volumes:
      - companion-data:/companion/data
    environment:
      - COMPANION_NAME=Lila
      - KOKORO_BASE_URL=http://Lila-voice:8880/v1

  Lila-voice:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: Lila-voice
    ports:
      - "8880:8880"
    environment:
      - DEFAULT_VOICE=af_sky
      - DEFAULT_SPEED=1.0
    volumes:
      - kokoro-models:/app/models

  Lila-memory:
    image: chromadb/chroma:latest
    container_name: Lila-memory
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  companion-data:
  kokoro-models:
  chroma-data:
